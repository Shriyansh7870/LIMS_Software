version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: kairoz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kairoz
      POSTGRES_PASSWORD: kairoz_secret
      POSTGRES_DB: kairoz_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kairoz -d kairoz_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kairoz-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      target: development
    container_name: kairoz-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://kairoz:kairoz_secret@db:5432/kairoz_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret_change_in_production
      JWT_REFRESH_SECRET: dev_jwt_refresh_secret_change_in_production
      PORT: 3001
      FRONTEND_URL: http://localhost:5173
    ports:
      - '3001:3001'
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    command: sh -c "npx prisma migrate dev --name init && npx prisma db seed && npm run dev"

  web:
    build:
      context: ./frontend
      target: development
    container_name: kairoz-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - '5173:5173'
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  postgres_data:
  redis_data:
